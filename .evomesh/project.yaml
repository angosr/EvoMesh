accounts:
  '2': ~/.claude2
  main: ~/.claude
created: 2026-03-15
git:
  auto_push: true
  branch: main
  conflict_resolution: auto
name: EvoMesh
repo: ''
roles:
  executor:
    account: '2'
    description: 代码实现，测试，提交
    evolution_upgrade_every: 20
    loop_interval: 10m
    scope:
    - src/
    - tests/
    type: worker
  lead:
    account: '2'
    description: 项目总控，审查所有角色，维护战略蓝图
    evolution_upgrade_every: 30
    loop_interval: 20m
    scope:
    - .evomesh/blueprint.md
    - .evomesh/status.md
    - .evomesh/roles/*/inbox/
    - docs/
    type: lead
