<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoMesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; height: 100vh; display: flex; }

  /* Sidebar */
  #sidebar { width: 240px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar h1 { padding: 16px; font-size: 18px; color: #e94560; border-bottom: 1px solid #0f3460; }
  #project-tree { flex: 1; overflow-y: auto; }
  .project-group { border-bottom: 1px solid #0f3460; }
  .project-header { display: flex; align-items: center; gap: 6px; padding: 10px 12px; cursor: pointer; border: none; background: none; color: #e0e0e0; font-size: 13px; width: 100%; text-align: left; font-weight: 600; }
  .project-header:hover { background: #1a1a3e; }
  .project-header .arrow { font-size: 10px; transition: transform 0.2s; color: #888; width: 12px; }
  .project-header .arrow.open { transform: rotate(90deg); }
  .project-header .pstats { margin-left: auto; font-size: 11px; color: #666; font-weight: 400; }
  .project-roles { padding-left: 12px; }
  .project-roles.collapsed { display: none; }
  .role-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; cursor: pointer; border: none; background: none; color: #ccc; font-size: 13px; width: 100%; text-align: left; transition: background 0.15s; }
  .role-btn:hover { background: #1a1a3e; }
  .role-btn.active { background: #0f3460; color: #fff; }
  .role-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .role-btn .dot.running { background: #4ade80; }
  .role-btn .dot.stopped { background: #555; }
  .role-btn .login-warn { color: #ef4444; font-size: 9px; margin-left: 2px; font-weight: 600; }
  .role-btn .info { font-size: 10px; color: #666; margin-left: auto; }
  .role-btn .del-role { opacity: 0; color: #ef4444; cursor: pointer; font-size: 12px; margin-left: 4px; }
  .role-btn:hover .del-role { opacity: 0.5; }
  .role-btn .del-role:hover { opacity: 1; }
  .add-role-btn { display: flex; align-items: center; gap: 4px; padding: 5px 12px; cursor: pointer; border: none; background: none; color: #555; font-size: 11px; width: 100%; text-align: left; }
  .add-role-btn:hover { color: #e94560; }
  /* Role add modal */
  #role-modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  #role-modal-overlay.show { display: flex; }
  #role-modal { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; width: 340px; }
  #role-modal h3 { color: #e94560; margin-bottom: 12px; font-size: 15px; }
  #role-modal label { display: block; color: #888; font-size: 11px; margin-bottom: 4px; margin-top: 10px; }
  #role-modal input, #role-modal select { width: 100%; padding: 8px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; font-size: 13px; }
  #role-modal input:focus, #role-modal select:focus { outline: none; border-color: #e94560; }
  #role-modal .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  #role-modal .modal-btns button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  #role-modal .btn-create { background: #e94560; color: #fff; }
  #role-modal .btn-create:hover { background: #d63851; }
  #role-modal .btn-close { background: #333; color: #888; }
  #role-modal .btn-close:hover { background: #444; }
  #add-project-area { padding: 8px 12px; border-top: 1px solid #0f3460; }
  #add-project-btn { width: 100%; padding: 8px; background: #1a1a2e; border: 1px dashed #0f3460; color: #888; cursor: pointer; border-radius: 6px; font-size: 12px; }
  #add-project-btn:hover { border-color: #e94560; color: #e94560; }
  #add-form { display: none; }
  #add-form input { width: 100%; padding: 6px 8px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; font-size: 12px; margin-bottom: 6px; }
  #add-form input:focus { outline: none; border-color: #e94560; }
  #add-form .btns { display: flex; gap: 4px; }
  #add-form .btns button { flex: 1; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
  #add-form .btn-ok { background: #e94560; color: #fff; }
  #add-form .btn-cancel { background: #333; color: #888; }
  #add-form { position: relative; }
  #autocomplete { position: absolute; bottom: 100%; left: 0; right: 0; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 10; }
  #autocomplete.show { display: block; }
  #autocomplete .ac-item { padding: 6px 8px; cursor: pointer; font-size: 11px; display: flex; justify-content: space-between; }
  #autocomplete .ac-item:hover, #autocomplete .ac-item.selected { background: #0f3460; }
  #autocomplete .ac-item .ac-badge { color: #4ade80; font-size: 9px; }
  #status-bar { padding: 10px 12px; border-top: 1px solid #0f3460; font-size: 11px; color: #666; }
  .login-alert { background: #3b1010; border: 1px solid #ef4444; color: #ef4444; padding: 6px 10px; margin: 6px 12px; border-radius: 4px; font-size: 10px; }

  /* Main area */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  #tab-bar { display: flex; align-items: center; background: #16213e; border-bottom: 1px solid #0f3460; min-height: 36px; }
  #tabs { display: flex; flex: 1; overflow-x: auto; }
  .tab { padding: 8px 14px; cursor: pointer; border: none; background: none; color: #888; font-size: 12px; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .tab:hover { color: #e0e0e0; }
  .tab.active { color: #e94560; border-bottom-color: #e94560; }
  .tab { cursor: grab; }
  .tab.dragging { opacity: 0.4; }
  .tab.drag-over { border-left: 2px solid #e94560; }
  .tab .close { margin-left: 6px; opacity: 0.4; cursor: pointer; }
  .tab .close:hover { opacity: 1; }
  #layout-controls { display: flex; gap: 4px; padding: 4px 8px; flex-shrink: 0; }
  #layout-controls button { background: #1a1a2e; border: 1px solid #0f3460; color: #888; padding: 4px 8px; cursor: pointer; font-size: 11px; border-radius: 3px; }
  #layout-controls button:hover, #layout-controls button.active { color: #e94560; border-color: #e94560; }

  /* System metrics */
  #metrics { display: flex; gap: 10px; padding: 0 10px; align-items: center; flex-shrink: 0; }
  .metric { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888; }
  .metric-bar { width: 40px; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
  .metric-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .metric-bar-fill.ok { background: #4ade80; }
  .metric-bar-fill.warn { background: #fbbf24; }
  .metric-bar-fill.crit { background: #ef4444; }

  /* Panels */
  #panels { flex: 1; position: relative; overflow: hidden; }
  .panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
  .panel.active { display: block; }
  .panel iframe { width: 100%; height: 100%; border: none; background: #000; }
  #dashboard { padding: 24px; overflow-y: auto; }
  #dashboard h2 { color: #e94560; margin-bottom: 16px; }
  .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card h3 { color: #4ade80; margin-bottom: 8px; font-size: 14px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #0f3460; font-size: 12px; }
  th { color: #888; font-size: 10px; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .badge.running { background: #064e3b; color: #4ade80; }
  .badge.stopped { background: #333; color: #888; }
  .badge.lead { background: #422006; color: #fbbf24; }
  .badge.worker { background: #1e1b4b; color: #818cf8; }
  .badge.login-needed { background: #3b1010; color: #ef4444; }
  .acct-select { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 2px 4px; border-radius: 4px; font-size: 11px; cursor: pointer; max-width: 110px; }

  /* Grid */
  #panels.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; }
  #panels.grid .panel { position: relative; display: block !important; }
  #panels.grid .panel.hidden-grid { display: none !important; }

  /* Chat sidebar */
  #chat-sidebar { width: 320px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
  #chat-sidebar h2 { padding: 10px 14px; font-size: 13px; color: #e94560; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 6px; }
  #chat-sidebar h2 .pulse { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #chat-project-select { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: auto; }
  #chat-feed { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
  .feed-msg { padding: 6px 8px; border-radius: 6px; font-size: 11px; line-height: 1.5; }
  .feed-msg.status { background: #1a1a2e; border: 1px solid #0f3460; }
  .feed-msg.status .role-name { color: #818cf8; font-weight: 600; }
  .feed-msg.status .role-name.lead { color: #fbbf24; }
  .feed-msg.status .role-status { color: #aaa; margin-left: 4px; }
  .feed-msg.status .ts { color: #555; font-size: 9px; float: right; }
  .feed-msg.status .proj-label { color: #e94560; font-size: 10px; font-weight: 600; }
  .feed-msg.user { background: #0f3460; border: 1px solid #1a3a6e; margin-left: 20px; }
  .feed-msg.user .label { color: #e94560; font-weight: 600; font-size: 10px; }
  .feed-msg.system { background: #1a2e1a; border: 1px solid #0f4620; color: #4ade80; font-size: 10px; text-align: center; }
  .feed-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
  .feed-dot.running { background: #4ade80; }
  .feed-dot.stopped { background: #666; }
  #chat-input-area { border-top: 1px solid #0f3460; padding: 6px; display: flex; gap: 4px; }
  #chat-input { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 6px 8px; border-radius: 6px; font-size: 12px; font-family: inherit; resize: none; outline: none; }
  #chat-input:focus { border-color: #e94560; }
  #chat-input::placeholder { color: #555; }
  #chat-send { background: #e94560; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  #chat-send:hover { background: #d63851; }
  #chat-send:disabled { background: #444; cursor: not-allowed; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>EvoMesh</h1>
  <div id="project-tree"></div>
  <div id="add-project-area">
    <button id="add-project-btn" onclick="showAddForm()">+ Add Project</button>
    <div id="add-form">
      <div id="autocomplete"></div>
      <input id="add-input" placeholder="GitHub URL or local path (e.g. ~/work/)" autocomplete="off" />
      <div class="btns">
        <button class="btn-ok" onclick="doAddProject()">Add</button>
        <button class="btn-cancel" onclick="hideAddForm()">Cancel</button>
      </div>
    </div>
  </div>
  <div id="status-bar">Loading...</div>
</div>

<div id="main">
  <div id="tab-bar">
    <div id="tabs">
      <button class="tab active" data-panel="dashboard" onclick="switchTo('dashboard')">Dashboard</button>
    </div>
    <div id="metrics">
      <div class="metric" title="CPU">
        <span>CPU</span>
        <div class="metric-bar"><div class="metric-bar-fill ok" id="m-cpu" style="width:0%"></div></div>
        <span id="m-cpu-val">-</span>
      </div>
      <div class="metric" title="Memory">
        <span>MEM</span>
        <div class="metric-bar"><div class="metric-bar-fill ok" id="m-mem" style="width:0%"></div></div>
        <span id="m-mem-val">-</span>
      </div>
      <div class="metric" title="Disk">
        <span>DISK</span>
        <div class="metric-bar"><div class="metric-bar-fill ok" id="m-disk" style="width:0%"></div></div>
        <span id="m-disk-val">-</span>
      </div>
    </div>
    <div id="layout-controls">
      <button id="btn-tabs" class="active" onclick="setLayout('tabs')">Tabs</button>
      <button id="btn-grid" onclick="setLayout('grid')">Grid</button>
    </div>
  </div>
  <div id="panels">
    <div class="panel active" id="panel-dashboard">
      <div id="dashboard">
        <h2>Project Overview</h2>
        <div id="dash-content">Loading...</div>
      </div>
    </div>
  </div>
</div>

<div id="chat-sidebar">
  <h2>
    <span class="pulse"></span> Mission Control
    <select id="chat-project-select" onchange="chatProjectChanged()"></select>
  </h2>
  <div id="chat-feed"></div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="2" placeholder="Message to Lead..."></textarea>
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<div id="role-modal-overlay" onclick="if(event.target===this)closeRoleModal()">
  <div id="role-modal">
    <h3>Add Role</h3>
    <input type="hidden" id="rm-slug" />
    <label>Role Name</label>
    <input id="rm-name" placeholder="e.g. designer, tester" />
    <label>Template</label>
    <select id="rm-template">
      <option value="executor">executor</option>
      <option value="lead">lead</option>
      <option value="reviewer">reviewer</option>
    </select>
    <label>Account</label>
    <select id="rm-account"></select>
    <div class="modal-btns">
      <button class="btn-create" onclick="doCreateRole()">Create</button>
      <button class="btn-close" onclick="closeRoleModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = `${location.origin}/api`;

const state = {
  projects: [],    // [{slug, name, roles: [...]}]
  accounts: [],
  openPanels: {},  // "slug/role" -> {tab, panel}
  activePanel: 'dashboard',
  layout: 'tabs',
  collapsed: {},   // slug -> bool
  chatProject: null,
};

// --- Data fetching ---

async function fetchAll() {
  try {
    const [projRes, acctRes] = await Promise.all([
      fetch(`${API}/projects`),
      fetch(`${API}/accounts`),
    ]);
    const projData = await projRes.json();
    const acctData = await acctRes.json();
    state.accounts = acctData.accounts || [];

    // Fetch status for each project
    const projects = [];
    for (const p of projData.projects) {
      try {
        const sRes = await fetch(`${API}/projects/${p.slug}/status`);
        const sData = await sRes.json();
        projects.push({ ...p, roles: sData.roles || [], accounts: sData.accounts || {} });
      } catch {
        projects.push({ ...p, roles: [], accounts: {} });
      }
    }
    state.projects = projects;
    if (!state.chatProject && projects.length > 0) state.chatProject = projects[0].slug;

    renderSidebar();
    renderDashboard();
    renderChatProjectSelect();
  } catch {
    document.getElementById('status-bar').textContent = 'Connection error';
  }
}

// --- Sidebar: project tree ---

function renderSidebar() {
  const tree = document.getElementById('project-tree');
  tree.innerHTML = '';

  // Login alerts
  const needLogin = [];
  state.projects.forEach(p => p.roles.forEach(r => { if (r.needsLogin) needLogin.push(`${p.name}/${r.name}`); }));
  if (needLogin.length) {
    const alert = document.createElement('div');
    alert.className = 'login-alert';
    alert.textContent = `Login needed: ${needLogin.join(', ')}`;
    tree.appendChild(alert);
  }

  let totalRunning = 0, totalRoles = 0;

  for (const p of state.projects) {
    const group = document.createElement('div');
    group.className = 'project-group';

    const running = p.roles.filter(r => r.running).length;
    totalRunning += running;
    totalRoles += p.roles.length;
    const isOpen = !state.collapsed[p.slug];

    const header = document.createElement('button');
    header.className = 'project-header';
    header.innerHTML = `<span class="arrow ${isOpen ? 'open' : ''}">&#9654;</span>
      <span>${p.name}</span>
      <span class="pstats">${running}/${p.roles.length}</span>`;
    header.onclick = () => { state.collapsed[p.slug] = !state.collapsed[p.slug]; renderSidebar(); };
    group.appendChild(header);

    const rolesDiv = document.createElement('div');
    rolesDiv.className = `project-roles ${isOpen ? '' : 'collapsed'}`;

    for (const r of p.roles) {
      const btn = document.createElement('button');
      const key = `${p.slug}/${r.name}`;
      btn.className = `role-btn ${state.activePanel === key ? 'active' : ''}`;
      const loginW = r.needsLogin ? '<span class="login-warn">LOGIN</span>' : '';
      btn.innerHTML = `<span class="dot ${r.running ? 'running' : 'stopped'}"></span>
        <span>${r.name}</span>${loginW}
        <span class="info">${r.account}</span>
        <span class="del-role" onclick="event.stopPropagation(); deleteRole('${p.slug}','${r.name}')" title="Delete role">&times;</span>`;
      btn.onclick = () => openTerminal(p.slug, p.name, r.name, r.terminal);
      rolesDiv.appendChild(btn);
    }

    // Add role button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-role-btn';
    addBtn.textContent = '+ Add Role';
    addBtn.onclick = () => showRoleModal(p.slug);
    rolesDiv.appendChild(addBtn);

    group.appendChild(rolesDiv);
    tree.appendChild(group);
  }

  document.getElementById('status-bar').textContent =
    `${state.projects.length} projects · ${totalRunning}/${totalRoles} running`;
}

// --- Dashboard ---

function renderDashboard() {
  const el = document.getElementById('dash-content');
  if (state.projects.length === 0) {
    el.innerHTML = '<div class="card"><p style="color:#888">No projects. Click "+ Add Project" to get started.</p></div>';
    return;
  }

  const acctOpts = state.accounts.map(a => {
    const w = a.needsLogin ? ' (needs login)' : '';
    return `<option value="${esc(a.name)}" data-path="${esc(a.path)}">${esc(a.name)} (${esc(a.path)})${w}</option>`;
  }).join('');

  let html = '';
  for (const p of state.projects) {
    const rows = p.roles.map(r => {
      const loginB = r.needsLogin ? '<span class="badge login-needed">login</span>' : '';
      return `<tr>
        <td><strong>${r.name}</strong></td>
        <td><span class="badge ${r.type}">${r.type}</span></td>
        <td>${r.loop_interval}</td>
        <td><span class="badge ${r.running ? 'running' : 'stopped'}">${r.running ? 'running' : 'stopped'}</span> ${loginB}</td>
        <td><select class="acct-select" data-slug="${p.slug}" data-role="${r.name}" onchange="switchAccount('${p.slug}','${r.name}',this)">${acctOpts}</select></td>
        <td>${r.terminal ? `<a href="${r.terminal}" target="_blank" style="color:#818cf8">Open</a>` : '-'}</td>
      </tr>`;
    }).join('');

    html += `<div class="card">
      <h3>${esc(p.name)}</h3>
      <table>
        <tr><th>Role</th><th>Type</th><th>Interval</th><th>Status</th><th>Account</th><th>Terminal</th></tr>
        ${rows}
      </table>
    </div>`;

    // Set account selections after render
    setTimeout(() => {
      for (const r of p.roles) {
        const sel = document.querySelector(`select[data-slug="${p.slug}"][data-role="${r.name}"]`);
        if (sel) sel.value = r.account;
      }
    }, 0);
  }

  el.innerHTML = html;
}

// --- Terminal ---

function openTerminal(slug, projectName, roleName, terminalPath) {
  const key = `${slug}/${roleName}`;
  if (state.openPanels[key]) { switchTo(key); return; }
  if (!terminalPath) { alert(`No terminal for ${projectName}/${roleName}. Is it running?`); return; }

  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.dataset.panel = key;
  tab.onclick = () => switchTo(key);
  tab.innerHTML = `${projectName}/${roleName} <span class="close" onclick="event.stopPropagation(); closePanel('${key}')">&times;</span>`;
  document.getElementById('tabs').appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = `panel-${key}`;
  panel.innerHTML = `<iframe src="${terminalPath}" allow="clipboard-read; clipboard-write"></iframe>`;
  document.getElementById('panels').appendChild(panel);

  state.openPanels[key] = { tab, panel };
  switchTo(key);
}

function closePanel(key) {
  const p = state.openPanels[key];
  if (!p) return;
  p.tab.remove();
  p.panel.remove();
  delete state.openPanels[key];
  if (state.activePanel === key) switchTo('dashboard');
}

function switchTo(name) {
  state.activePanel = name;
  // Clicking Dashboard or a specific panel in grid mode → switch back to tabs
  if (state.layout === 'grid') {
    setLayout('tabs');
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
}

function setLayout(mode) {
  state.layout = mode;
  const panels = document.getElementById('panels');
  document.getElementById('btn-tabs').classList.toggle('active', mode === 'tabs');
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  if (mode === 'grid') {
    panels.classList.add('grid');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-dashboard')?.classList.add('hidden-grid');
  } else {
    panels.classList.remove('grid');
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.remove('hidden-grid');
      p.classList.toggle('active', p.id === `panel-${state.activePanel}`);
    });
  }
}

// --- Account switching ---

async function switchAccount(slug, roleName, selectEl) {
  const accountName = selectEl.value;
  const option = selectEl.selectedOptions[0];
  if (!confirm(`Switch ${roleName} to "${accountName}"? This will restart with loop.`)) { fetchAll(); return; }
  try {
    const res = await fetch(`${API}/projects/${slug}/roles/${roleName}/account`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accountName, accountPath: option?.dataset?.path }),
    });
    const data = await res.json();
    if (data.ok) {
      addFeedMessage(`Account: <strong>${roleName}</strong> -> ${accountName}${data.restarted ? ' (restarting...)' : ''}`, 'system');
      const key = `${slug}/${roleName}`;
      if (state.openPanels[key]) closePanel(key);
      setTimeout(fetchAll, 5000);
    }
  } catch { addFeedMessage('Failed to switch account', 'system'); }
}

// --- Add project ---

function showAddForm() {
  document.getElementById('add-project-btn').style.display = 'none';
  document.getElementById('add-form').style.display = 'block';
  document.getElementById('add-input').focus();
}
function hideAddForm() {
  document.getElementById('add-project-btn').style.display = 'block';
  document.getElementById('add-form').style.display = 'none';
  document.getElementById('add-input').value = '';
}

async function doAddProject() {
  const input = document.getElementById('add-input').value.trim();
  if (!input) return;

  const body = input.startsWith('http') || input.startsWith('git@')
    ? { url: input } : { path: input };

  try {
    addFeedMessage(`Adding project: ${esc(input)}...`, 'system');
    const res = await fetch(`${API}/projects/add`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok) {
      addFeedMessage(`Project <strong>${esc(data.project.name)}</strong> added. Lead starting...`, 'system');
      hideAddForm();
      setTimeout(fetchAll, 3000);
    } else {
      addFeedMessage(`Error: ${data.error}`, 'system');
    }
  } catch { addFeedMessage('Failed to add project', 'system'); }
}

// --- Path autocomplete ---
let acTimer = null;
let acIndex = -1;

const addInput = document.getElementById('add-input');
const acBox = document.getElementById('autocomplete');

addInput.addEventListener('input', () => {
  clearTimeout(acTimer);
  const val = addInput.value.trim();
  if (!val || val.startsWith('http') || val.startsWith('git@')) { acBox.classList.remove('show'); return; }
  acTimer = setTimeout(() => fetchCompletions(val), 150);
});

addInput.addEventListener('keydown', e => {
  const items = acBox.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown' && acBox.classList.contains('show')) {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    updateAcSelection(items);
  } else if (e.key === 'ArrowUp' && acBox.classList.contains('show')) {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    updateAcSelection(items);
  } else if ((e.key === 'Tab' || e.key === 'Enter') && acBox.classList.contains('show') && items.length > 0) {
    e.preventDefault();
    const sel = acIndex >= 0 ? items[acIndex] : items[0];
    addInput.value = sel.dataset.path;
    acBox.classList.remove('show');
    acIndex = -1;
    // Continue completing subdirectories
    clearTimeout(acTimer);
    acTimer = setTimeout(() => fetchCompletions(addInput.value), 150);
  } else if (e.key === 'Enter') {
    // Only submit when autocomplete is NOT showing
    acBox.classList.remove('show');
    doAddProject();
  } else if (e.key === 'Escape') {
    if (acBox.classList.contains('show')) { acBox.classList.remove('show'); }
    else hideAddForm();
  }
});

addInput.addEventListener('blur', () => {
  setTimeout(() => acBox.classList.remove('show'), 200);
});

function updateAcSelection(items) {
  items.forEach((el, i) => el.classList.toggle('selected', i === acIndex));
}

async function fetchCompletions(q) {
  try {
    const res = await fetch(`${API}/complete-path?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!data.suggestions.length) { acBox.classList.remove('show'); return; }

    acBox.innerHTML = data.suggestions.map(s => {
      const safePath = esc(s.path).replace(/'/g, "\\'");
      return `<div class="ac-item" data-path="${esc(s.path)}" onmousedown="event.preventDefault(); selectCompletion('${safePath}')">
        <span>${esc(s.path)}</span>
        ${s.hasEvomesh ? '<span class="ac-badge">evomesh</span>' : ''}
      </div>`;
    }).join('');
    acBox.classList.add('show');
    acIndex = -1;
  } catch { acBox.classList.remove('show'); }
}

function selectCompletion(p) {
  addInput.value = p;
  acBox.classList.remove('show');
  acIndex = -1;
  addInput.focus();
  // Continue completing subdirectories
  clearTimeout(acTimer);
  acTimer = setTimeout(() => fetchCompletions(p), 150);
}

// --- Role management ---

function showRoleModal(slug) {
  document.getElementById('rm-slug').value = slug;
  document.getElementById('rm-name').value = '';
  // Populate account select
  const acctSel = document.getElementById('rm-account');
  acctSel.innerHTML = state.accounts.map(a =>
    `<option value="${esc(a.name)}">${esc(a.name)} (${esc(a.path)})</option>`
  ).join('');
  document.getElementById('role-modal-overlay').classList.add('show');
  document.getElementById('rm-name').focus();
}

function closeRoleModal() {
  document.getElementById('role-modal-overlay').classList.remove('show');
}

async function doCreateRole() {
  const slug = document.getElementById('rm-slug').value;
  const name = document.getElementById('rm-name').value.trim();
  const template = document.getElementById('rm-template').value;
  const account = document.getElementById('rm-account').value;
  if (!name) return;

  try {
    const res = await fetch(`${API}/projects/${slug}/roles`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, template, account }),
    });
    const data = await res.json();
    if (data.ok) {
      addFeedMessage(`Role <strong>${esc(name)}</strong> created (${template})`, 'system');
      closeRoleModal();
      fetchAll();
    } else {
      alert(data.error);
    }
  } catch { alert('Failed to create role'); }
}

async function deleteRole(slug, roleName) {
  if (!confirm(`Delete role "${roleName}"? This will stop it and remove all its files.`)) return;
  try {
    const res = await fetch(`${API}/projects/${slug}/roles/${roleName}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      addFeedMessage(`Role <strong>${esc(roleName)}</strong> deleted`, 'system');
      const key = `${slug}/${roleName}`;
      if (state.openPanels[key]) closePanel(key);
      fetchAll();
    } else { alert(data.error); }
  } catch { alert('Failed to delete role'); }
}

document.getElementById('rm-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') doCreateRole();
  if (e.key === 'Escape') closeRoleModal();
});

// --- Chat ---

let lastStatusContent = '';

function addFeedMessage(html, cls = 'status') {
  const feed = document.getElementById('chat-feed');
  const div = document.createElement('div');
  div.className = `feed-msg ${cls}`;
  div.innerHTML = html;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
  while (feed.children.length > 100) feed.removeChild(feed.firstChild);
}

function renderChatProjectSelect() {
  const sel = document.getElementById('chat-project-select');
  sel.innerHTML = state.projects.map(p =>
    `<option value="${p.slug}" ${p.slug === state.chatProject ? 'selected' : ''}>${esc(p.name)}</option>`
  ).join('');
}

function chatProjectChanged() {
  state.chatProject = document.getElementById('chat-project-select').value;
}

function renderStatusBlock(entries) {
  // Group by project
  const byProject = {};
  entries.forEach(e => {
    if (!byProject[e.slug]) byProject[e.slug] = { name: e.project, entries: [] };
    byProject[e.slug].entries.push(e);
  });

  return Object.entries(byProject).map(([slug, g]) => {
    const lines = g.entries.map(r => {
      const dot = `<span class="feed-dot ${r.running ? 'running' : 'stopped'}"></span>`;
      const nc = r.type === 'lead' ? 'role-name lead' : 'role-name';
      return `${dot}<span class="${nc}">${r.role}</span><span class="role-status">${r.status}</span>`;
    }).join('<br>');
    return `<span class="proj-label">${esc(g.name)}</span><br>${lines}`;
  }).join('<br>');
}

function startSSEFeed() {
  const es = new EventSource(`${API}/feed`);
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'status') {
        const ts = new Date(data.ts).toLocaleTimeString();
        const content = renderStatusBlock(data.entries);
        if (content === lastStatusContent) return;
        lastStatusContent = content;
        addFeedMessage(`<span class="ts">${ts}</span>${content}`, 'status');
      }
    } catch {}
  };
  es.onerror = () => { es.close(); setTimeout(startSSEFeed, 5000); };
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !state.chatProject) return;

  document.getElementById('chat-send').disabled = true;
  try {
    const res = await fetch(`${API}/projects/${state.chatProject}/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    if (data.ok) {
      addFeedMessage(`<span class="label">You</span> ${esc(text)}`, 'user');
      addFeedMessage(`Delivered to <strong>${data.delivered_to}</strong>`, 'system');
      input.value = '';
    } else { addFeedMessage(`Error: ${data.error}`, 'system'); }
  } catch { addFeedMessage('Failed to send', 'system'); }
  document.getElementById('chat-send').disabled = false;
  input.focus();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// --- Tab drag-and-drop reorder ---

function setupTabDrag(tab) {
  tab.draggable = true;
  tab.addEventListener('dragstart', e => {
    tab.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', tab.dataset.panel);
  });
  tab.addEventListener('dragend', () => {
    tab.classList.remove('dragging');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
  });
  tab.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const dragging = document.querySelector('.tab.dragging');
    if (dragging && dragging !== tab) tab.classList.add('drag-over');
  });
  tab.addEventListener('dragleave', () => tab.classList.remove('drag-over'));
  tab.addEventListener('drop', e => {
    e.preventDefault();
    tab.classList.remove('drag-over');
    const dragging = document.querySelector('.tab.dragging');
    if (!dragging || dragging === tab) return;
    const tabsContainer = document.getElementById('tabs');
    const tabs = [...tabsContainer.children];
    const fromIdx = tabs.indexOf(dragging);
    const toIdx = tabs.indexOf(tab);
    if (fromIdx < toIdx) {
      tabsContainer.insertBefore(dragging, tab.nextSibling);
    } else {
      tabsContainer.insertBefore(dragging, tab);
    }
  });
}

// Apply drag to Dashboard tab
setupTabDrag(document.querySelector('.tab[data-panel="dashboard"]'));

// Patch openTerminal to setup drag on new tabs
const _origOpenTerminal = openTerminal;
openTerminal = function(slug, projectName, roleName, terminalPath) {
  _origOpenTerminal(slug, projectName, roleName, terminalPath);
  const key = `${slug}/${roleName}`;
  if (state.openPanels[key]) setupTabDrag(state.openPanels[key].tab);
};

// --- System metrics ---

async function fetchMetrics() {
  try {
    const res = await fetch(`${API}/metrics`);
    const d = await res.json();
    updateMetric('cpu', d.cpu.percent, `${d.cpu.percent}%`);
    updateMetric('mem', d.memory.percent, `${d.memory.used}/${d.memory.total}`);
    updateMetric('disk', d.disk.percent, `${d.disk.used}/${d.disk.total}`);
  } catch {}
}

function updateMetric(id, percent, label) {
  const bar = document.getElementById(`m-${id}`);
  const val = document.getElementById(`m-${id}-val`);
  bar.style.width = percent + '%';
  bar.className = 'metric-bar-fill ' + (percent > 90 ? 'crit' : percent > 70 ? 'warn' : 'ok');
  val.textContent = label;
}

// --- Init ---
fetchAll();
fetchMetrics();
setInterval(fetchMetrics, 5000);
setInterval(fetchAll, 8000);
startSSEFeed();

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    const tabs = [...document.querySelectorAll('.tab')];
    if (tabs[parseInt(e.key) - 1]) tabs[parseInt(e.key) - 1].click();
  }
});
