<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoMesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css?v=1773731760">
</head>
<body>

<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileOverlay()"></div>

<!-- Left Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>EvoMesh</span>
    <span id="user-badge" class="user-badge"></span>
    <span class="conn-dot connected" id="conn-dot" title="Connection"></span>
  </div>
  <button id="dashboard-btn" class="active" onclick="switchTo('dashboard')">
    <span class="dash-icon">&#9638;</span> Dashboard
  </button>
  <button id="central-btn" onclick="openCentralTerminal()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;border:none;background:none;color:#ccc;font-size:12px;width:100%;text-align:left;border-bottom:1px solid #222;">
    <span class="dot stopped" id="central-dot"></span> Central AI
  </button>
  <div id="open-tabs-section">
    <div id="open-tabs-header" onclick="toggleOpenTabs()">
      <span class="arrow open" id="tabs-arrow">&#9654;</span>
      <span>Terminals</span>
      <span class="tab-count" id="tab-count">0</span>
    </div>
    <div id="open-tabs-list"></div>
  </div>
  <div id="project-tree"></div>
  <div id="status-bar">Loading...</div>
</div>
<div class="resize-handle" id="rh-left"></div>

<!-- Main -->
<div id="main">
  <div id="top-bar">
    <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Toggle sidebar">&#9776;</button>
    <span class="panel-title" id="panel-title"><strong>Dashboard</strong></span>
    <div id="layout-controls">
      <button id="btn-tabs" class="active" onclick="setLayout('tabs')">Tabs</button>
      <button id="btn-grid" onclick="setLayout('grid')">Grid</button>
    </div>
    <div id="metrics">
      <span class="conn-dot connected" id="conn-dot2" title="Connection"></span>
      <div class="metric" title="CPU"><span>CPU</span><div class="metric-bar"><div class="metric-bar-fill ok" id="m-cpu2" style="width:0%"></div></div><span id="m-cpu-val2"></span></div>
      <div class="metric" title="Memory"><span>MEM</span><div class="metric-bar"><div class="metric-bar-fill ok" id="m-mem2" style="width:0%"></div></div><span id="m-mem-val2"></span></div>
      <div class="metric" title="Disk"><span>DISK</span><div class="metric-bar"><div class="metric-bar-fill ok" id="m-disk2" style="width:0%"></div></div><span id="m-disk-val2"></span></div>
    </div>
    <button class="topbar-icon-btn" onclick="toggleChat()" title="Feed">&#128172;</button>
    <button class="topbar-icon-btn" onclick="switchTo('settings')" title="Settings">&#9881;&#xFE0E;</button>
  </div>
  <div id="panels">
    <div class="panel active" id="panel-dashboard">
      <div id="dashboard">
        <div id="dash-content">
          <div id="account-usage-section"></div>
          <div id="dash-projects"></div>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-settings">
      <div id="settings">
        <h2>Settings</h2>

        <div class="settings-section">
          <h3>Profile</h3>
          <dl class="settings-info" id="profile-info"></dl>
        </div>

        <div class="settings-section">
          <h3>Change Password</h3>
          <div class="settings-form" id="pw-form">
            <div class="form-row">
              <label>Current Password</label>
              <input type="password" id="pw-old" />
            </div>
            <div class="form-row">
              <label>New Password</label>
              <input type="password" id="pw-new" placeholder="Min 4 characters" />
            </div>
            <div class="form-row">
              <label>Confirm New Password</label>
              <input type="password" id="pw-confirm" />
            </div>
            <div>
              <button class="settings-btn primary" onclick="doChangePassword()">Update Password</button>
            </div>
            <div class="settings-msg" id="pw-msg"></div>
          </div>
        </div>

        <div class="settings-section" id="users-section" style="display:none">
          <h3>User Management</h3>
          <table class="user-table">
            <thead><tr><th>User</th><th>Role</th><th>Linux User</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
          <button class="settings-btn secondary" id="add-user-toggle" onclick="toggleAddUser()">+ Add User</button>
          <div class="add-user-form" id="add-user-form">
            <div class="field">
              <label>Username</label>
              <input id="new-username" placeholder="username" />
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="new-password" placeholder="min 4 chars" />
            </div>
            <div class="field">
              <label>Role</label>
              <select id="new-role"><option value="user">user</option><option value="owner">owner</option><option value="admin">admin</option></select>
            </div>
            <div class="field">
              <label>Linux User</label>
              <input id="new-linuxuser" placeholder="linux username" />
            </div>
            <button class="settings-btn primary" onclick="doAddUser()">Add</button>
            <button class="settings-btn secondary" onclick="toggleAddUser()">Cancel</button>
            <div class="settings-msg" id="add-user-msg" style="width:100%"></div>
          </div>
        </div>

        <div class="settings-section">
          <h3>Appearance</h3>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:12px;color:var(--text-dim)">Theme</span>
            <button class="settings-btn secondary" id="theme-toggle" onclick="toggleTheme()">Switch to Light</button>
          </div>
        </div>

        <div class="settings-section" id="mcp-section">
          <h3>MCP Servers</h3>
          <div id="mcp-list"></div>
          <div id="mcp-empty" class="mcp-empty">No MCP servers configured. MCP servers are defined in project.yaml per role.</div>
        </div>

        <div class="settings-section">
          <h3>System</h3>
          <dl class="settings-info" id="system-info"></dl>
          <div style="margin-top: 16px;">
            <button class="settings-btn danger" onclick="doLogout()">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="resize-handle" id="rh-right"></div>

<!-- Right Panel: Unified Feed -->
<div id="chat-sidebar">
  <h2><span class="pulse"></span> Feed <button class="mc-close" onclick="toggleChat()" title="Close">&times;</button></h2>
  <div id="feed"></div>
  <div id="feed-input">
    <textarea id="feed-msg" rows="1" placeholder="Message Central AI..." oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button id="feed-send">&#10148;</button>
  </div>
</div>

<script src="/app-layout.js?v=1773731760"></script>
<script src="/app-feed.js?v=1773731760"></script>
<script src="/app.js?v=1773731760"></script>
<script src="/app-dashboard.js?v=1773731760"></script>
<script src="/app-actions.js?v=1773731760"></script>
<script src="/app-panels.js?v=1773731760"></script>
<script src="/app-settings.js?v=1773731760"></script>
</body>
</html>
