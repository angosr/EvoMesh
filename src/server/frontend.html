<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoMesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; height: 100vh; display: flex; }

  /* Sidebar */
  #sidebar { width: 220px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar h1 { padding: 16px; font-size: 18px; color: #e94560; border-bottom: 1px solid #0f3460; }
  #sidebar h2 { padding: 12px 16px 4px; font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
  .role-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; border: none; background: none; color: #e0e0e0; font-size: 14px; width: 100%; text-align: left; transition: background 0.15s; }
  .role-btn:hover { background: #1a1a3e; }
  .role-btn.active { background: #0f3460; color: #fff; }
  .role-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .role-btn .dot.running { background: #4ade80; }
  .role-btn .dot.stopped { background: #666; }
  .role-btn .info { font-size: 11px; color: #888; margin-left: auto; }
  #status-bar { margin-top: auto; padding: 12px 16px; border-top: 1px solid #0f3460; font-size: 11px; color: #666; }

  /* Main area */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* Tab bar */
  #tab-bar { display: flex; align-items: center; background: #16213e; border-bottom: 1px solid #0f3460; min-height: 36px; }
  #tabs { display: flex; flex: 1; overflow-x: auto; }
  .tab { padding: 8px 16px; cursor: pointer; border: none; background: none; color: #888; font-size: 13px; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .tab:hover { color: #e0e0e0; }
  .tab.active { color: #e94560; border-bottom-color: #e94560; }
  .tab .close { margin-left: 8px; opacity: 0.4; cursor: pointer; }
  .tab .close:hover { opacity: 1; }
  #layout-controls { display: flex; gap: 4px; padding: 4px 8px; flex-shrink: 0; }
  #layout-controls button { background: #1a1a2e; border: 1px solid #0f3460; color: #888; padding: 4px 8px; cursor: pointer; font-size: 11px; border-radius: 3px; }
  #layout-controls button:hover, #layout-controls button.active { color: #e94560; border-color: #e94560; }

  /* Panels */
  #panels { flex: 1; position: relative; overflow: hidden; }
  .panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
  .panel.active { display: block; }
  .panel iframe { width: 100%; height: 100%; border: none; background: #000; }

  /* Dashboard */
  #dashboard { padding: 24px; overflow-y: auto; }
  #dashboard h2 { color: #e94560; margin-bottom: 16px; }
  .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card h3 { color: #4ade80; margin-bottom: 8px; font-size: 14px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #0f3460; font-size: 13px; }
  th { color: #888; font-size: 11px; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .badge.running { background: #064e3b; color: #4ade80; }
  .badge.stopped { background: #333; color: #888; }
  .badge.lead { background: #422006; color: #fbbf24; }
  .badge.worker { background: #1e1b4b; color: #818cf8; }

  /* Grid layout */
  #panels.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; }
  #panels.grid .panel { position: relative; display: block !important; }
  #panels.grid .panel.hidden-grid { display: none !important; }

  /* Right sidebar: chat panel */
  #chat-sidebar { width: 340px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
  #chat-sidebar h2 { padding: 12px 16px; font-size: 14px; color: #e94560; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 8px; }
  #chat-sidebar h2 .pulse { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #chat-feed { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .feed-msg { padding: 8px 10px; border-radius: 6px; font-size: 12px; line-height: 1.5; }
  .feed-msg.status { background: #1a1a2e; border: 1px solid #0f3460; }
  .feed-msg.status .role-name { color: #818cf8; font-weight: 600; }
  .feed-msg.status .role-name.lead { color: #fbbf24; }
  .feed-msg.status .role-status { color: #aaa; margin-left: 4px; }
  .feed-msg.status .ts { color: #555; font-size: 10px; float: right; }
  .feed-msg.user { background: #0f3460; border: 1px solid #1a3a6e; margin-left: 24px; }
  .feed-msg.user .label { color: #e94560; font-weight: 600; font-size: 11px; }
  .feed-msg.system { background: #1a2e1a; border: 1px solid #0f4620; color: #4ade80; font-size: 11px; text-align: center; }
  .feed-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .feed-dot.running { background: #4ade80; }
  .feed-dot.stopped { background: #666; }
  #chat-input-area { border-top: 1px solid #0f3460; padding: 8px; display: flex; gap: 6px; }
  #chat-input { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; resize: none; outline: none; }
  #chat-input:focus { border-color: #e94560; }
  #chat-input::placeholder { color: #555; }
  #chat-send { background: #e94560; border: none; color: #fff; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  #chat-send:hover { background: #d63851; }
  #chat-send:disabled { background: #444; cursor: not-allowed; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>EvoMesh</h1>
  <h2>Roles</h2>
  <div id="role-list"></div>
  <div id="status-bar">Loading...</div>
</div>

<div id="main">
  <div id="tab-bar">
    <div id="tabs">
      <button class="tab active" data-panel="dashboard" onclick="switchTo('dashboard')">Dashboard</button>
    </div>
    <div id="layout-controls">
      <button id="btn-tabs" class="active" onclick="setLayout('tabs')">Tabs</button>
      <button id="btn-grid" onclick="setLayout('grid')">Grid</button>
    </div>
  </div>
  <div id="panels">
    <div class="panel active" id="panel-dashboard">
      <div id="dashboard">
        <h2>Project Overview</h2>
        <div id="dash-content">Loading...</div>
      </div>
    </div>
  </div>
</div>

<div id="chat-sidebar">
  <h2><span class="pulse"></span> Mission Control</h2>
  <div id="chat-feed"></div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="2" placeholder="Message to Lead..."></textarea>
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
const API = `${location.origin}/api`;

const state = {
  roles: [],
  openPanels: {},  // roleName -> { tab, panel }
  activePanel: 'dashboard',
  layout: 'tabs',
};

async function fetchStatus() {
  try {
    const res = await fetch(`${API}/status`);
    const data = await res.json();
    state.roles = data.roles;
    renderSidebar(data);
    renderDashboard(data);
  } catch {
    document.getElementById('status-bar').textContent = 'Connection error';
  }
}

function renderSidebar(data) {
  const list = document.getElementById('role-list');
  list.innerHTML = '';
  for (const role of data.roles) {
    const btn = document.createElement('button');
    btn.className = `role-btn ${state.activePanel === role.name ? 'active' : ''}`;
    btn.innerHTML = `
      <span class="dot ${role.running ? 'running' : 'stopped'}"></span>
      <span>${role.name}</span>
      <span class="info">${role.loop_interval}</span>`;
    btn.onclick = () => openTerminal(role.name, role.ttyd_port);
    list.appendChild(btn);
  }
  const running = data.roles.filter(r => r.running).length;
  document.getElementById('status-bar').textContent = `${data.project} · ${running}/${data.roles.length} running`;
}

function renderDashboard(data) {
  const el = document.getElementById('dash-content');
  const rows = data.roles.map(r => `
    <tr>
      <td><strong>${r.name}</strong></td>
      <td><span class="badge ${r.type}">${r.type}</span></td>
      <td>${r.loop_interval}</td>
      <td><span class="badge ${r.running ? 'running' : 'stopped'}">${r.running ? 'running' : 'stopped'}</span></td>
      <td style="color:#888">${r.description}</td>
      <td>${r.ttyd_port ? `<a href="${location.protocol}//${location.hostname}:${r.ttyd_port}/${r.name}/" target="_blank" style="color:#818cf8">Open</a>` : '-'}</td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="card">
      <h3>Roles</h3>
      <table>
        <tr><th>Name</th><th>Type</th><th>Interval</th><th>Status</th><th>Description</th><th>Terminal</th></tr>
        ${rows}
      </table>
    </div>
    <div class="card">
      <h3>Usage</h3>
      <p style="color:#888;font-size:13px;line-height:1.8">
        Click a role in the sidebar to embed its terminal.<br>
        Click "Open" to open ttyd in a new tab (full standalone terminal).<br>
        Use <strong>Grid</strong> to view all terminals side by side.
      </p>
    </div>`;
}

function openTerminal(roleName, ttydPort) {
  if (state.openPanels[roleName]) {
    switchTo(roleName);
    return;
  }
  if (!ttydPort) {
    alert(`No terminal available for ${roleName}. Is it running?`);
    return;
  }

  // Create tab
  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.dataset.panel = roleName;
  tab.onclick = () => switchTo(roleName);
  tab.innerHTML = `${roleName} <span class="close" onclick="event.stopPropagation(); closePanel('${roleName}')">&times;</span>`;
  document.getElementById('tabs').appendChild(tab);

  // Create panel with iframe to ttyd
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = `panel-${roleName}`;

  const ttydUrl = `${location.protocol}//${location.hostname}:${ttydPort}/${roleName}/`;
  panel.innerHTML = `<iframe src="${ttydUrl}" allow="clipboard-read; clipboard-write"></iframe>`;
  document.getElementById('panels').appendChild(panel);

  state.openPanels[roleName] = { tab, panel };
  switchTo(roleName);
}

function closePanel(roleName) {
  const p = state.openPanels[roleName];
  if (!p) return;
  p.tab.remove();
  p.panel.remove();
  delete state.openPanels[roleName];
  if (state.activePanel === roleName) switchTo('dashboard');
}

function switchTo(name) {
  state.activePanel = name;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.panel === name));
  if (state.layout === 'tabs') {
    document.querySelectorAll('.panel').forEach(p =>
      p.classList.toggle('active', p.id === `panel-${name}`));
  }
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
}

function setLayout(mode) {
  state.layout = mode;
  const panels = document.getElementById('panels');
  document.getElementById('btn-tabs').classList.toggle('active', mode === 'tabs');
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');

  if (mode === 'grid') {
    panels.classList.add('grid');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-dashboard')?.classList.add('hidden-grid');
  } else {
    panels.classList.remove('grid');
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.remove('hidden-grid');
      p.classList.toggle('active', p.id === `panel-${state.activePanel}`);
    });
  }
}

// --- Chat / Feed ---

let lastFeedTs = '';

function addFeedMessage(html, cls = 'status') {
  const feed = document.getElementById('chat-feed');
  const div = document.createElement('div');
  div.className = `feed-msg ${cls}`;
  div.innerHTML = html;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function startSSEFeed() {
  const es = new EventSource(`${API}/feed`);
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'status') {
        const ts = new Date(data.ts).toLocaleTimeString();
        if (ts === lastFeedTs) return; // skip duplicate
        lastFeedTs = ts;

        const lines = data.entries.map(r => {
          const dot = `<span class="feed-dot ${r.running ? 'running' : 'stopped'}"></span>`;
          const nameClass = r.type === 'lead' ? 'role-name lead' : 'role-name';
          return `${dot}<span class="${nameClass}">${r.role}</span><span class="role-status">${r.status}</span>`;
        }).join('<br>');

        addFeedMessage(`<span class="ts">${ts}</span>${lines}`, 'status');

        // Keep feed manageable (max 50 entries)
        const feed = document.getElementById('chat-feed');
        while (feed.children.length > 50) feed.removeChild(feed.firstChild);
      }
    } catch {}
  };
  es.onerror = () => {
    setTimeout(() => startSSEFeed(), 5000);
    es.close();
  };
}

async function loadChatHistory() {
  try {
    const res = await fetch(`${API}/chat/history`);
    const data = await res.json();
    for (const msg of data.messages) {
      addFeedMessage(`<span class="label">You</span> ${escapeHtml(msg.body)}`, 'user');
    }
  } catch {}
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send');
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    if (data.ok) {
      addFeedMessage(`<span class="label">You</span> ${escapeHtml(text)}`, 'user');
      addFeedMessage(`Delivered to <strong>${data.delivered_to}</strong>`, 'system');
      input.value = '';
    } else {
      addFeedMessage(`Error: ${data.error}`, 'system');
    }
  } catch (e) {
    addFeedMessage('Failed to send message', 'system');
  }
  btn.disabled = false;
  input.focus();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Enter to send (Shift+Enter for newline)
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

// --- Init ---
fetchStatus();
setInterval(fetchStatus, 5000);
loadChatHistory();
startSSEFeed();

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    const tabs = [...document.querySelectorAll('.tab')];
    if (tabs[parseInt(e.key) - 1]) tabs[parseInt(e.key) - 1].click();
  }
});
</script>
</body>
</html>
