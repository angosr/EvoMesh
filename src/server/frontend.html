<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoMesh</title>
<link rel="stylesheet" href="/app.css?v=6">
</head>
<body>

<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileOverlay()"></div>

<!-- Left Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>EvoMesh</span>
    <span class="conn-dot connected" id="conn-dot" title="Connection"></span>
  </div>
  <button id="dashboard-btn" class="active" onclick="switchTo('dashboard')">
    <span class="dash-icon">&#9638;</span> Dashboard
  </button>
  <button id="central-btn" onclick="openCentralTerminal()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;border:none;background:none;color:#ccc;font-size:12px;width:100%;text-align:left;border-bottom:1px solid #222;">
    <span style="color:#e94560">&#9679;</span> Central AI
  </button>
  <div id="open-tabs-section">
    <div id="open-tabs-header" onclick="toggleOpenTabs()">
      <span class="arrow open" id="tabs-arrow">&#9654;</span>
      <span>Terminals</span>
      <span class="tab-count" id="tab-count">0</span>
    </div>
    <div id="open-tabs-list"></div>
  </div>
  <div id="project-tree"></div>
  <div id="add-project-area">
    <button id="add-project-btn" onclick="showAddForm()">+ Add Project</button>
    <div id="add-form">
      <div id="autocomplete"></div>
      <input id="add-input" placeholder="GitHub URL or local path..." autocomplete="off" />
      <select id="add-lang" style="width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #222;color:#e0e0e0;border-radius:4px;font-size:11px;margin-bottom:4px;">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
      <div class="btns">
        <button class="btn-ok" onclick="doAddProject()">Add</button>
        <button class="btn-cancel" onclick="hideAddForm()">Cancel</button>
      </div>
    </div>
  </div>
  <div id="status-bar">Loading...</div>
</div>
<div class="resize-handle" id="rh-left"></div>

<!-- Main -->
<div id="main">
  <div id="top-bar">
    <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Toggle sidebar">&#9776;</button>
    <span class="panel-title" id="panel-title"><strong>Dashboard</strong></span>
    <div id="layout-controls">
      <button id="btn-tabs" class="active" onclick="setLayout('tabs')">Tabs</button>
      <button id="btn-grid" onclick="setLayout('grid')">Grid</button>
    </div>
    <div id="metrics">
      <span class="conn-dot connected" id="conn-dot2" title="Connection"></span>
      <div class="metric" title="CPU"><span>CPU</span><div class="metric-bar"><div class="metric-bar-fill ok" id="m-cpu2" style="width:0%"></div></div><span id="m-cpu-val2"></span></div>
      <div class="metric" title="Memory"><span>MEM</span><div class="metric-bar"><div class="metric-bar-fill ok" id="m-mem2" style="width:0%"></div></div><span id="m-mem-val2"></span></div>
      <div class="metric" title="Disk"><span>DISK</span><div class="metric-bar"><div class="metric-bar-fill ok" id="m-disk2" style="width:0%"></div></div><span id="m-disk-val2"></span></div>
    </div>
    <button class="topbar-icon-btn" onclick="toggleChat()" title="Mission Control">&#128172;</button>
    <button class="topbar-icon-btn" onclick="switchTo('settings')" title="Settings">&#9881;&#xFE0E;</button>
  </div>
  <div id="panels">
    <div class="panel active" id="panel-dashboard">
      <div id="dashboard">
        <h2>Project Overview</h2>
        <div id="dash-content">Loading...</div>
      </div>
    </div>
    <div class="panel" id="panel-settings">
      <div id="settings">
        <h2>Settings</h2>

        <div class="settings-section">
          <h3>Profile</h3>
          <dl class="settings-info" id="profile-info"></dl>
        </div>

        <div class="settings-section">
          <h3>Change Password</h3>
          <div class="settings-form" id="pw-form">
            <div class="form-row">
              <label>Current Password</label>
              <input type="password" id="pw-old" />
            </div>
            <div class="form-row">
              <label>New Password</label>
              <input type="password" id="pw-new" placeholder="Min 4 characters" />
            </div>
            <div class="form-row">
              <label>Confirm New Password</label>
              <input type="password" id="pw-confirm" />
            </div>
            <div>
              <button class="settings-btn primary" onclick="doChangePassword()">Update Password</button>
            </div>
            <div class="settings-msg" id="pw-msg"></div>
          </div>
        </div>

        <div class="settings-section" id="users-section" style="display:none">
          <h3>User Management</h3>
          <table class="user-table">
            <thead><tr><th>User</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
          <button class="settings-btn secondary" id="add-user-toggle" onclick="toggleAddUser()">+ Add User</button>
          <div class="add-user-form" id="add-user-form">
            <div class="field">
              <label>Username</label>
              <input id="new-username" placeholder="username" />
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="new-password" placeholder="min 4 chars" />
            </div>
            <div class="field">
              <label>Role</label>
              <select id="new-role"><option value="user">user</option><option value="admin">admin</option></select>
            </div>
            <button class="settings-btn primary" onclick="doAddUser()">Add</button>
            <button class="settings-btn secondary" onclick="toggleAddUser()">Cancel</button>
            <div class="settings-msg" id="add-user-msg" style="width:100%"></div>
          </div>
        </div>

        <div class="settings-section">
          <h3>System</h3>
          <dl class="settings-info" id="system-info"></dl>
          <div style="margin-top: 16px;">
            <button class="settings-btn danger" onclick="doLogout()">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="resize-handle" id="rh-right"></div>

<!-- Right Panel: Mission Control -->
<div id="chat-sidebar">
  <h2><span class="pulse"></span> Central AI</h2>
  <div id="central-status" style="padding:8px;font-size:11px;color:#888;border-bottom:1px solid #222;max-height:40%;overflow-y:auto;white-space:pre-wrap;line-height:1.5"></div>
  <div id="central-feed" style="flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px"></div>
  <div style="border-top:1px solid #222;padding:6px;display:flex;gap:4px">
    <textarea id="central-input" rows="2" placeholder="Ask Central AI..." style="flex:1;background:#0a0a0a;border:1px solid #222;color:#e0e0e0;padding:6px;border-radius:5px;font-size:12px;font-family:inherit;resize:none;outline:none"></textarea>
    <button id="central-send" onclick="sendToCentral()" style="background:#e94560;border:none;color:#fff;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600">Send</button>
  </div>
</div>

<!-- Role Modal -->
<div id="role-modal-overlay" onclick="if(event.target===this)closeRoleModal()">
  <div id="role-modal">
    <h3>Add Role</h3>
    <input type="hidden" id="rm-slug" />
    <label>Role Name</label>
    <input id="rm-name" placeholder="e.g. designer, tester" />
    <label>Template</label>
    <select id="rm-template"><option value="executor">executor</option><option value="lead">lead</option><option value="reviewer">reviewer</option></select>
    <label>Account</label>
    <select id="rm-account"></select>
    <div class="modal-btns">
      <button class="btn-create" onclick="doCreateRole()">Create</button>
      <button class="btn-close" onclick="closeRoleModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/app.js?v=6"></script>
<script src="/app-panels.js?v=6"></script>
<script src="/app-settings.js?v=6"></script>
</body>
</html>
